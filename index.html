<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#0b1220" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="mobile-web-app-capable" content="yes" />
<title>Connect 4</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%231e6bcc'/%3E%3Ccircle cx='20' cy='22' r='8' fill='%23e63946'/%3E%3Ccircle cx='44' cy='22' r='8' fill='%230b1733'/%3E%3Ccircle cx='20' cy='44' r='8' fill='%230b1733'/%3E%3Ccircle cx='44' cy='44' r='8' fill='%23f4d35e'/%3E%3C/svg%3E" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="app">

  <!-- HOME -->
  <section class="screen" data-screen="home">
    <div class="hero">
      <div class="logo">
        <span class="dot r"></span><span class="dot y"></span><span class="dot r"></span><span class="dot y"></span>
      </div>
      <h1>Connect 4</h1>
      <p class="tag">Two players. One board. One winner.</p>
    </div>

    <label class="field">
      <span>Your name</span>
      <input id="nameInput" type="text" maxlength="16" autocomplete="off" placeholder="Player" />
    </label>

    <div class="actions">
      <button class="btn primary" id="hostBtn">Create game</button>
      <button class="btn" id="joinBtn">Join game</button>
    </div>

    <button class="link" id="statsBtn">View stats</button>
  </section>

  <!-- WAITING (host) -->
  <section class="screen" data-screen="waiting" hidden>
    <button class="back" data-back>← Back</button>
    <h2>Share this code</h2>
    <div class="code" id="codeDisplay">——————</div>
    <div class="actions">
      <button class="btn" id="copyCodeBtn">Copy code</button>
      <button class="btn" id="copyLinkBtn">Copy link</button>
    </div>
    <p class="status" id="hostStatus">Starting…</p>
    <div class="spinner" id="hostSpinner" aria-hidden="true"></div>
    <button class="btn primary" id="hostRetryBtn" hidden>Try again</button>
  </section>

  <!-- JOIN -->
  <section class="screen" data-screen="join" hidden>
    <button class="back" data-back>← Back</button>
    <h2>Enter code</h2>
    <input id="joinCode" class="code-input" type="text" maxlength="6" autocomplete="off" autocapitalize="characters" placeholder="ABC123" />
    <div class="actions">
      <button class="btn primary" id="joinGoBtn">Join</button>
    </div>
    <p class="status" id="joinStatus"></p>
  </section>

  <!-- CONNECTING -->
  <section class="screen" data-screen="connecting" hidden>
    <h2>Connecting…</h2>
    <div class="spinner" id="connectSpinner" aria-hidden="true"></div>
    <p class="status" id="connectStatus">Finding opponent</p>
    <button class="btn primary" id="joinRetryBtn" hidden>Try again</button>
    <button class="btn ghost" data-back>Cancel</button>
  </section>

  <!-- GAME -->
  <section class="screen game" data-screen="game" hidden>
    <header class="hud">
      <div class="player me">
        <span class="badge" id="myBadge"></span>
        <div class="pname"><span id="myName">You</span></div>
        <div class="pscore"><span id="myScore">0</span></div>
      </div>
      <div class="vs">
        <div class="turn" id="turnLabel">Your turn</div>
        <div class="vs-sep">vs</div>
      </div>
      <div class="player opp">
        <span class="badge" id="oppBadge"></span>
        <div class="pname"><span id="oppName">Opponent</span></div>
        <div class="pscore"><span id="oppScore">0</span></div>
      </div>
    </header>

    <div class="board-wrap">
      <div class="board" id="board" aria-label="Connect 4 board">
        <div class="cells" id="cells"></div>
        <div class="columns" id="columns"></div>
      </div>
    </div>

    <div class="endbar" id="endbar" hidden>
      <div class="endtext" id="endText"></div>
      <div class="actions">
        <button class="btn primary" id="rematchBtn">Rematch</button>
        <button class="btn ghost" id="leaveBtn">Leave</button>
      </div>
    </div>

    <div class="gamefoot">
      <span class="conn" id="connDot"></span>
      <span id="connText">Connected</span>
    </div>
  </section>

  <!-- STATS -->
  <section class="screen" data-screen="stats" hidden>
    <button class="back" data-back>← Back</button>
    <h2>Stats</h2>
    <div id="statsBody" class="stats"></div>
    <button class="btn ghost" id="clearStatsBtn">Clear all</button>
  </section>

</div>

<script src="peerjs.min.js"></script>
<script src="game.js"></script>
</body>
</html>
